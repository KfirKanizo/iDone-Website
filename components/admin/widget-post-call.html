<div class="widget-card">
    <h3>
        <span class="material-icons-round" style="color:var(--primary);">mail</span>
        שליחת מייל "תודה על השיחה"
    </h3>
    <form id="form-post-call">
        <div class="form-group">
            <label for="post-call-name">שם לקוח</label>
            <input type="text" id="post-call-name" placeholder="הכנס שם מלא" required />
        </div>
        <div class="form-group">
            <label for="post-call-email">אימייל לקוח</label>
            <input type="email" id="post-call-email" placeholder="client@example.com" required />
        </div>
        <div class="form-actions">
            <button type="button" class="preview-button" id="btn-preview-post-call">
                <span class="material-icons-round">visibility</span> תצוגה
            </button>
            <button type="submit" class="submit-button" style="margin-top: 0;">שגר 🚀</button>
        </div>
        <div id="feedback-post-call" class="feedback-message"></div>
    </form>
</div>
